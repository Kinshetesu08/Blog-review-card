<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>


  <link rel="stylesheet" href="styles.css">
</head>
<body>

 
  <div class = "card">
    <div class = "card-container">

    <div class = "card-image">
      <img src="./assets/images/illustration-article.svg" alt="Colorful abstract design representing Web 3.0 with interconnected digital elements">
    </div>
    <div class = "card-category">
      <span>Learning</span>
    </div>
    <div class = "card-content">
      <h3>Published 21 Dec 2023</h3>
      <h1>HTML & CSS foundations</h1>
      <p>These languages are the backbone of every websites, defining structure, content and presentation .</p>
      <div class = "card-author">
        <img src="./assets/images/image-avatar.webp" alt="Greg Hooper, author portrait headshot">
        <span>Greg Hooper</span>
      </div>
    </div>
    </div>
  </div>
<footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">LawalToluwani</a>.
  </footer>
</body>
</html>
